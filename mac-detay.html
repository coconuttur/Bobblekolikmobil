<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maç Detayı | Bobblekolik</title>
    <style>
        :root {
            /* AYDINLIK TEMA */
            --bg: #f8f9fa; --card: #ffffff; --text: #2d3436; 
            --primary: #800000; --accent: #ffd700; --border: #e0e0e0;
            --sub-text: #636e72; --header-text: #ffffff;
            --score-bg: #eee6d6;
        }

        [data-theme="dark"] {
            /* KARANLIK TEMA */
            --bg: #121212; --card: #1e1e1e; --text: #e8e1d1;
            --border: #333; --sub-text: #a0a0a0;
            --score-bg: #2a2a2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; }

        /* Üst Navigasyon */
        .back-nav { 
            position: sticky; top: 0; z-index: 1000; height: 60px;
            background: var(--primary); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 2px solid var(--accent);
        }
        .back-btn { color: white; text-decoration: none; font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .theme-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 10px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        .lang-picker { display: flex; gap: 5px; }
        .lang-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; background: #fff; cursor: pointer; padding: 0; opacity: 0.5; }
        .lang-btn.active { opacity: 1; border-width: 2px; transform: scale(1.1); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Header / Skor Alanı */
        .match-header {
            background: linear-gradient(to bottom, var(--primary), var(--bg));
            padding: 30px 15px 50px 15px;
            text-align: center;
        }
        .match-meta { 
            font-size: 12px; font-weight: 800; color: white; opacity: 0.8; 
            margin-bottom: 20px; background: rgba(0,0,0,0.2); display: inline-block;
            padding: 4px 12px; border-radius: 20px;
        }

        .score-board {
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .team-box { 
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer;
        }
        .team-logo-large { 
            width: 85px; height: 85px; border-radius: 50%; background: white; 
            border: 3px solid var(--accent); object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .team-name { font-size: 14px; font-weight: 900; color: var(--text); text-transform: uppercase; text-align: center; }

        .score-display {
            font-size: 42px; font-weight: 900; color: var(--primary); 
            background: var(--score-bg); padding: 10px 20px; border-radius: 15px;
            min-width: 90px; text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        /* MVP Bölümü */
        .container { padding: 0 15px; margin-top: -25px; }
        
        .mvp-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        
        .mvp-badge {
            background: var(--accent); color: #000; font-size: 10px; font-weight: 900;
            padding: 4px 12px; border-radius: 10px; margin-bottom: 10px; letter-spacing: 1px;
        }

        .mvp-name { 
            font-size: 20px; font-weight: 900; color: var(--text); 
            text-transform: uppercase; margin-bottom: 15px; cursor: pointer;
            text-decoration: underline dotted var(--accent);
        }

        .rating-container {
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg); padding: 15px; border-radius: 15px; width: 100%;
        }
        .rating-value { font-size: 36px; font-weight: 900; color: var(--primary); }
        .rating-label { font-size: 10px; font-weight: 700; color: var(--sub-text); text-transform: uppercase; }

        /* Mobil Alt Bilgi */
        .info-section { margin-top: 20px; text-align: center; font-size: 12px; color: var(--sub-text); font-style: italic; }

    </style>
</head>
<body data-theme="dark"> <nav class="back-nav">
    <a href="index.html" class="back-btn" id="txt-back">⬅ LİG MERKEZİ</a>
    <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️</button>
        <div class="lang-picker">
            <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr"><img src="https://flagcdn.com/w40/tr.png"></button>
            <button class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w40/gb.png"></button>
            <button class="lang-btn" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w40/pt.png"></button>
        </div>
    </div>
</nav>

<div class="match-header">
    <div class="match-meta" id="m-date">...</div>
    
    <div class="score-board">
        <div class="team-box" id="box-team1">
            <img id="logo1" src="" class="team-logo-large">
            <div id="team1" class="team-name">---</div>
        </div>
        
        <div id="m-score" class="score-display">VS</div>
        
        <div class="team-box" id="box-team2">
            <img id="logo2" src="" class="team-logo-large">
            <div id="team2" class="team-name">---</div>
        </div>
    </div>
</div>

<div class="container">
    <div id="mvp-container" class="mvp-card" style="display: none;">
        <span class="mvp-badge" id="txt-mvp-label">MAÇIN ADAMI</span>
        <div id="m-mvp" class="mvp-name">---</div>
        
        <div class="rating-container">
            <div id="m-rating" class="rating-value">0.0</div>
            <div class="rating-label" id="txt-rating-label">MAÇ PUANI</div>
        </div>
    </div>
    
    <div class="info-section" id="txt-info">
        Maç detayları ve oyuncu performansları Bobblekolik tarafından onaylanmıştır.
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBEi_PQ2oYKW23Fu65M7MKPFKELRbqY6XQ", authDomain: "bobblekolik.firebaseapp.com", projectId: "bobblekolik", storageBucket: "bobblekolik.firebasestorage.app", messagingSenderId: "566665011913", appId: "1:566665011913:web:4e2570f7291f82fdb76318" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const translations = {
        tr: { back: "⬅ LİG MERKEZİ", mvp: "MAÇIN ADAMI (MVP)", score: "MAÇ PUANI", loading: "YÜKLENİYOR...", info: "Maç detayları Bobblekolik tarafından onaylanmıştır." },
        en: { back: "⬅ LEAGUE", mvp: "MAN OF THE MATCH", score: "MATCH RATING", loading: "LOADING...", info: "Match details are verified by Bobblekolik." },
        pt: { back: "⬅ LIGA", mvp: "HOMEM DO JOGO", score: "AVALIAÇÃO", loading: "CARREGANDO...", info: "Detalhes verificados por Bobblekolik." }
    };

    let currentLang = 'tr';

    // TEMA KONTROLÜ
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        if (body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            icon.innerText = '☀️';
            localStorage.setItem('match-theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
            icon.innerText = '🌙';
            localStorage.setItem('match-theme', 'light');
        }
    }

    // Başlangıç Temasını Yükle (Varsayılan Dark)
    const savedTheme = localStorage.getItem('match-theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        
        const t = translations[lang];
        document.getElementById('txt-back').innerText = t.back;
        document.getElementById('txt-mvp-label').innerText = t.mvp;
        document.getElementById('txt-rating-label').innerText = t.score;
        document.getElementById('txt-info').innerText = t.info;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if (matchId) {
        const [t1, t2_date] = matchId.split("-vs-");
        const t2 = t2_date.split("-")[0];
        const datejav = t2_date.split("-")[1];

        let logos = {};
        db.collection("teams").get().then(snap => {
            snap.forEach(doc => { logos[doc.data().name] = doc.data().logo; });
            
            db.collection("matches")
                .where("team1", "==", t1)
                .where("team2", "==", t2)
                .where("datejav", "==", parseInt(datejav))
                .get().then(mSnap => {
                    if(!mSnap.empty) {
                        const m = mSnap.docs[0].data();
                        document.getElementById('m-date').innerText = "📅 " + (m.date || '---');
                        document.getElementById('team1').innerText = m.team1;
                        document.getElementById('team2').innerText = m.team2;
                        document.getElementById('logo1').src = logos[m.team1] || '';
                        document.getElementById('logo2').src = logos[m.team2] || '';
                        document.getElementById('m-score').innerText = m.played ? `${m.score1} - ${m.score2}` : "VS";
                        
                        document.getElementById('box-team1').onclick = () => window.location.href = `takim.html?name=${encodeURIComponent(m.team1)}`;
                        document.getElementById('box-team2').onclick = () => window.location.href = `takim.html?name=${encodeURIComponent(m.team2)}`;

                        if(m.played && m.mvp) {
                            document.getElementById('mvp-container').style.display = 'flex';
                            document.getElementById('m-mvp').innerText = m.mvp;
                            document.getElementById('m-rating').innerText = m.rating || '0.0';
                            document.getElementById('m-mvp').onclick = () => window.location.href = `oyuncu-detay.html?name=${encodeURIComponent(m.mvp)}`;
                        }
                    }
                });
        });
    }

    setLang('tr');
</script>
</body>
</html>
