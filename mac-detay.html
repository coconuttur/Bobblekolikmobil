<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maç Detayı | Bobblekolik</title>
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --text: #2d3436; 
            --primary: #800000; --accent: #ffd700; --border: #e0e0e0;
            --sub-text: #636e72; --score-bg: #1a1a1a;
        }

        [data-theme="dark"] {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #e8e1d1;
            --border: #2a2a2a; --sub-text: #a0a0a0;
            --score-bg: #252525;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

        /* Navigasyon */
        .back-nav { 
            position: sticky; top: 0; z-index: 1000; height: 60px;
            background: var(--primary); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 3px solid var(--accent);
        }
        .back-btn { color: white; text-decoration: none; font-weight: 800; font-size: 13px; }
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .theme-toggle { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 10px; border-radius: 8px; cursor: pointer; }
        .lang-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; cursor: pointer; opacity: 0.6; }
        .lang-btn.active { opacity: 1; border-width: 2px; transform: scale(1.1); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Modern Skor Alanı */
        .match-header {
            background: linear-gradient(180deg, var(--primary) 0%, var(--bg) 100%);
            padding: 20px 10px 40px 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .match-meta { 
            font-size: 11px; font-weight: 800; color: white; background: rgba(0,0,0,0.3);
            padding: 5px 15px; border-radius: 20px; margin-bottom: 25px; letter-spacing: 0.5px;
        }

        .scoreboard-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            max-width: 500px;
            gap: 10px;
        }

        .team-unit {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer;
        }
        .team-logo {
            width: 75px; height: 75px; border-radius: 50%; background: white;
            padding: 5px; border: 3px solid var(--accent); object-fit: contain;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .team-label { font-size: 13px; font-weight: 900; text-align: center; color: var(--text); text-transform: uppercase; }

        .score-box {
            display: flex; align-items: center; justify-content: center;
            background: var(--score-bg);
            padding: 12px 18px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            min-width: 110px;
        }
        .score-val {
            font-size: 38px; font-weight: 900; color: var(--accent);
            font-family: 'Courier New', monospace; /* Dijital hava için */
        }
        .score-divider {
            font-size: 24px; font-weight: 900; color: white; margin: 0 10px; opacity: 0.5;
        }

        /* MVP Bölümü */
        .main-content { padding: 0 15px; margin-top: -20px; }
        
        .mvp-wrapper {
            background: var(--card); border-radius: 24px; padding: 25px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center;
        }

        .mvp-title {
            background: var(--primary); color: white; font-size: 10px; font-weight: 900;
            padding: 5px 15px; border-radius: 50px; margin-bottom: 12px;
        }

        .mvp-name { 
            font-size: 22px; font-weight: 900; color: var(--text); 
            text-transform: uppercase; margin-bottom: 20px; cursor: pointer;
            border-bottom: 2px solid var(--accent);
        }

        .rating-box {
            background: var(--bg); border-radius: 15px; padding: 15px;
            width: 100%; display: flex; flex-direction: column; align-items: center;
            border: 1px dashed var(--accent);
        }
        .rating-num { font-size: 40px; font-weight: 900; color: var(--primary); line-height: 1; }
        .rating-txt { font-size: 10px; font-weight: 700; color: var(--sub-text); margin-top: 5px; }

        .footer-note { margin-top: 25px; text-align: center; font-size: 11px; color: var(--sub-text); opacity: 0.7; }
    </style>
</head>
<body data-theme="dark">

<nav class="back-nav">
    <a href="index.html" class="back-btn" id="txt-back">⬅ LİG MERKEZİ</a>
    <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️</button>
        <div class="lang-picker">
            <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr"><img src="https://flagcdn.com/w40/tr.png"></button>
            <button class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w40/gb.png"></button>
            <button class="lang-btn" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w40/pt.png"></button>
        </div>
    </div>
</nav>

<header class="match-header">
    <div class="match-meta" id="m-date">...</div>
    
    <div class="scoreboard-container">
        <div class="team-unit" id="box-team1">
            <img id="logo1" src="" class="team-logo">
            <div id="team1" class="team-label">---</div>
        </div>

        <div class="score-box">
            <span id="s1" class="score-val">0</span>
            <span class="score-divider">:</span>
            <span id="s2" class="score-val">0</span>
        </div>

        <div class="team-unit" id="box-team2">
            <img id="logo2" src="" class="team-logo">
            <div id="team2" class="team-label">---</div>
        </div>
    </div>
</header>

<main class="main-content">
    <div id="mvp-container" class="mvp-wrapper" style="display: none;">
        <div class="mvp-title" id="txt-mvp-label">MAÇIN ADAMI</div>
        <div id="m-mvp" class="mvp-name">---</div>
        
        <div class="rating-box">
            <div id="m-rating" class="rating-num">0.0</div>
            <div class="rating-txt" id="txt-rating-label">MAÇ PUANI</div>
        </div>
    </div>
    
    <p class="footer-note" id="txt-info">Maç verileri Bobblekolik tarafından doğrulanmıştır.</p>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBEi_PQ2oYKW23Fu65M7MKPFKELRbqY6XQ", authDomain: "bobblekolik.firebaseapp.com", projectId: "bobblekolik", storageBucket: "bobblekolik.firebasestorage.app", messagingSenderId: "566665011913", appId: "1:566665011913:web:4e2570f7291f82fdb76318" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const translations = {
        tr: { back: "⬅ LİG MERKEZİ", mvp: "MAÇIN ADAMI (MVP)", score: "MAÇ PUANI", info: "Maç verileri Bobblekolik tarafından doğrulanmıştır." },
        en: { back: "⬅ LEAGUE", mvp: "MAN OF THE MATCH", score: "MATCH RATING", info: "Match data verified by Bobblekolik." },
        pt: { back: "⬅ LIGA", mvp: "HOMEM DO JOGO", score: "AVALIAÇÃO", info: "Dados verificados por Bobblekolik." }
    };

    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
        localStorage.setItem('match-theme', newTheme);
    }

    const savedTheme = localStorage.getItem('match-theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const t = translations[lang];
        document.getElementById('txt-back').innerText = t.back;
        document.getElementById('txt-mvp-label').innerText = t.mvp;
        document.getElementById('txt-rating-label').innerText = t.score;
        document.getElementById('txt-info').innerText = t.info;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if (matchId) {
        const [t1, t2_date] = matchId.split("-vs-");
        const t2 = t2_date.split("-")[0];
        const datejav = t2_date.split("-")[1];

        let logos = {};
        db.collection("teams").get().then(snap => {
            snap.forEach(doc => { logos[doc.data().name] = doc.data().logo; });
            
            db.collection("matches")
                .where("team1", "==", t1).where("team2", "==", t2)
                .where("datejav", "==", parseInt(datejav))
                .get().then(mSnap => {
                    if(!mSnap.empty) {
                        const m = mSnap.docs[0].data();
                        document.getElementById('m-date').innerText = "📅 " + (m.date || '---');
                        document.getElementById('team1').innerText = m.team1;
                        document.getElementById('team2').innerText = m.team2;
                        document.getElementById('logo1').src = logos[m.team1] || '';
                        document.getElementById('logo2').src = logos[m.team2] || '';
                        
                        if(m.played) {
                            document.getElementById('s1').innerText = m.score1;
                            document.getElementById('s2').innerText = m.score2;
                        } else {
                            document.getElementById('s1').innerText = "-";
                            document.getElementById('s2').innerText = "-";
                        }
                        
                        document.getElementById('box-team1').onclick = () => window.location.href = `takim.html?name=${encodeURIComponent(m.team1)}`;
                        document.getElementById('box-team2').onclick = () => window.location.href = `takim.html?name=${encodeURIComponent(m.team2)}`;

                        if(m.played && m.mvp) {
                            document.getElementById('mvp-container').style.display = 'flex';
                            document.getElementById('m-mvp').innerText = m.mvp;
                            document.getElementById('m-rating').innerText = m.rating || '0.0';
                            document.getElementById('m-mvp').onclick = () => window.location.href = `oyuncu-detay.html?name=${encodeURIComponent(m.mvp)}`;
                        }
                    }
                });
        });
    }
    setLang('tr');
</script>
</body>
</html>
