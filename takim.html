<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Takım Detayı | Bobblekolik</title>
    <style>
        /* TEMA DEĞİŞKENLERİ */
        :root {
            /* AYDINLIK TEMA */
            --bg: #f8f9fa; --card: #ffffff; --text: #2d3436; 
            --primary: #800000; --accent: #ffd700; --border: #e0e0e0;
            --sub-text: #636e72; --header-text: #ffffff;
            --plus: #2ecc71; --minus: #e74c3c;
        }

        [data-theme="dark"] {
            /* KARANLIK TEMA */
            --bg: #0f0f0f; --card: #1a1a1a; --text: #e8e1d1;
            --border: #2a2a2a; --sub-text: #a0a0a0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }

        /* Üst Navigasyon */
        .back-nav { 
            position: sticky; top: 0; z-index: 1000; height: 60px;
            background: var(--primary); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 2px solid var(--accent);
        }
        .back-btn { color: white; text-decoration: none; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .theme-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 10px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        .lang-picker { display: flex; gap: 5px; }
        .lang-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; background: #fff; cursor: pointer; padding: 0; opacity: 0.5; }
        .lang-btn.active { opacity: 1; border-width: 2px; transform: scale(1.1); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Header Area */
        .team-header { 
            background: linear-gradient(to bottom, var(--primary), var(--bg)); 
            padding: 30px 20px 40px 20px; text-align: center; 
        }
        .team-logo-large { 
            width: 100px; height: 100px; border-radius: 50%; background: white; 
            border: 4px solid var(--accent); object-fit: cover; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }
        .team-title { font-size: 24px; font-weight: 900; color: var(--accent); text-transform: uppercase; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }

        /* Meta Container */
        .meta-container { display: flex; gap: 10px; padding: 0 15px; margin-top: -25px; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .meta-box { 
            flex: 1; background: var(--card); border-radius: 18px; padding: 12px; 
            text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .meta-label { font-size: 10px; font-weight: 900; color: var(--primary); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .meta-img { width: 100%; height: 70px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; background: #222; }
        .meta-name { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text); }

        .container { padding: 0 15px; max-width: 600px; margin: 0 auto; }
        .section-title { 
            font-size: 15px; font-weight: 900; color: var(--primary); 
            margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; 
        }
        .section-title::after { content: ""; height: 2px; background: var(--border); flex: 1; opacity: 0.5; }

        /* Performans Grid - MANTIKSAL SIRALAMA */
        .performance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .perf-card { 
            background: var(--card); padding: 15px 10px; border-radius: 15px; 
            text-align: center; border: 1px solid var(--border); 
        }
        .perf-value { font-size: 22px; font-weight: 900; color: var(--text); display: block; }
        .perf-label { font-size: 9px; font-weight: 800; color: var(--sub-text); text-transform: uppercase; }
        
        .border-win { border-bottom: 3px solid #2ecc71; }
        .border-draw { border-bottom: 3px solid #f1c40f; }
        .border-loss { border-bottom: 3px solid #e74c3c; }
        .border-av { border-bottom: 3px solid var(--accent); }

        /* Oyuncu Kartı */
        .player-card { 
            background: var(--card); padding: 12px 15px; border-radius: 18px; 
            margin-bottom: 10px; display: flex; align-items: center; border: 1px solid var(--border);
        }
        .player-img { width: 48px; height: 48px; border-radius: 12px; margin-right: 15px; object-fit: cover; border: 2px solid var(--primary); }
        .player-info b { font-size: 14px; color: var(--text); text-transform: uppercase; display: block; }
        .role-badge { 
            margin-left: auto; padding: 4px 10px; border-radius: 8px; 
            font-size: 9px; font-weight: 900; text-transform: uppercase;
        }
        .role-captain { background: var(--accent); color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .role-player { background: var(--bg); color: var(--sub-text); border: 1px solid var(--border); }

        /* Maç Kartları */
        .match-card { 
            background: var(--card); padding: 15px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
        }
        .match-date-tag { font-size: 10px; font-weight: 800; color: var(--sub-text); display: block; text-align: center; margin-bottom: 10px; }
        .match-content { display: flex; align-items: center; justify-content: space-between; }
        .match-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; text-align: center; color: var(--text); }
        .match-logo-small { width: 38px; height: 38px; border-radius: 50%; background: white; border: 1px solid var(--border); object-fit: contain; }
        .match-score { background: var(--primary); color: white; padding: 6px 14px; border-radius: 10px; font-size: 18px; font-weight: 900; min-width: 65px; text-align: center; }

        .insta-footer { text-align: center; margin-top: 30px; margin-bottom: 20px; }
        .insta-link { 
            display: inline-flex; align-items: center; gap: 8px; 
            text-decoration: none; color: white; background: linear-gradient(45deg, #f09433, #e74371, #962fbf); 
            padding: 12px 25px; border-radius: 30px; font-weight: 800; font-size: 13px;
            box-shadow: 0 5px 15px rgba(231, 67, 113, 0.3);
        }
    </style>
</head>
<body data-theme="dark"> <nav class="back-nav">
    <a href="index.html" class="back-btn" id="txt-home">⬅ GERİ</a>
    <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️</button>
        <div class="lang-picker">
            <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr"><img src="https://flagcdn.com/w40/tr.png"></button>
            <button class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w40/gb.png"></button>
            <button class="lang-btn" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w40/pt.png"></button>
        </div>
    </div>
</nav>

<div class="team-header">
    <img id="team-logo" class="team-logo-large" src="">
    <h1 id="team-name" class="team-title">...</h1>
</div>

<div class="meta-container">
    <div class="meta-box">
        <span class="meta-label" id="txt-country-label">ÜLKE</span>
        <img id="flag-large" class="meta-img" src="">
        <span id="country-name" class="meta-name">-</span>
    </div>
    <div class="meta-box">
        <span class="meta-label" id="txt-animal-label">MASKOT</span>
        <img id="animal-large" class="meta-img" src="">
        <span id="animal-name" class="meta-name">-</span>
    </div>
</div>

<div class="container">
    <div class="section-title" id="txt-stats">PERFORMANS</div>
    
    <div class="performance-grid">
        <div class="perf-card border-win"><span class="perf-value" id="p-wins">0</span><span class="perf-label" id="txt-w">Galibiyet</span></div>
        <div class="perf-card border-draw"><span class="perf-value" id="p-draws">0</span><span class="perf-label" id="txt-d">Beraberlik</span></div>
        <div class="perf-card border-loss"><span class="perf-value" id="p-losses">0</span><span class="perf-label" id="txt-l">Mağlubiyet</span></div>
    </div>
    <div class="performance-grid">
        <div class="perf-card"><span class="perf-value" id="p-goals-for" style="color: #2ecc71;">0</span><span class="perf-label" id="txt-gf">Atılan</span></div>
        <div class="perf-card"><span class="perf-value" id="p-goals-against" style="color: #e74c3c;">0</span><span class="perf-label" id="txt-ga">Yenilen</span></div>
        <div class="perf-card border-av"><span class="perf-value" id="p-av">0</span><span class="perf-label" id="txt-av">Averaj</span></div>
    </div>

    <div class="section-title" id="txt-squad">KADRO</div>
    <div id="player-list"></div>

    <div class="section-title" id="txt-last">SON MAÇLAR</div>
    <div id="played-matches"></div>

    <div class="section-title" id="txt-next">GELECEK</div>
    <div id="upcoming-matches"></div>

    <div id="insta-area" class="insta-footer" style="display:none;">
        <a id="insta-url" href="#" target="_blank" class="insta-link">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="18" style="filter: brightness(0) invert(1);">
            <span id="insta-team-name">INSTAGRAM</span>
        </a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBEi_PQ2oYKW23Fu65M7MKPFKELRbqY6XQ", authDomain: "bobblekolik.firebaseapp.com", projectId: "bobblekolik", storageBucket: "bobblekolik.firebasestorage.app", messagingSenderId: "566665011913", appId: "1:566665011913:web:4e2570f7291f82fdb76318" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const translations = {
        tr: { home: "⬅ GERİ", squad: "TAKIM KADROSU", stats: "PERFORMANS", last: "SON MAÇLAR", next: "GELECEK MAÇLAR", w: "Galibiyet", d: "Beraberlik", l: "Mağlubiyet", gf: "Atılan", ga: "Yenilen", av: "Averaj", goal: "GOL", wait: "TARİH BEKLENİYOR", captain: "KAPTAN", player: "OYUNCU", country: "ÜLKE", animal: "MASKOT" },
        en: { home: "⬅ BACK", squad: "SQUAD", stats: "PERFORMANCE", last: "RECENT", next: "UPCOMING", w: "Wins", d: "Draws", l: "Losses", gf: "Scored", ga: "Against", av: "GD", goal: "GOALS", wait: "PENDING", captain: "CAPTAIN", player: "PLAYER", country: "COUNTRY", animal: "MASCOT" },
        pt: { home: "⬅ VOLTAR", squad: "ELENCO", stats: "DESEMPENHO", last: "ÚLTIMOS", next: "PRÓXIMOS", w: "Vitórias", d: "Empates", l: "Derrotas", gf: "Gols Pró", ga: "Gols Contra", av: "Saldo", goal: "GOLS", wait: "PENDENTE", captain: "CAPITÃO", player: "JOGADOR", country: "PAÍS", animal: "MASCOTE" }
    };

    let currentLang = 'tr';
    const urlParams = new URLSearchParams(window.location.search);
    const teamName = urlParams.get('name');
    let allTeamLogos = {};

    // TEMA KONTROLÜ
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        if (body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            icon.innerText = '☀️';
            localStorage.setItem('theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
            icon.innerText = '🌙';
            localStorage.setItem('theme', 'light');
        }
    }

    // İlk açılışta karanlık mı aydınlık mı?
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const t = translations[lang];
        
        document.getElementById('txt-home').innerText = t.home;
        document.getElementById('txt-squad').innerText = t.squad;
        document.getElementById('txt-stats').innerText = t.stats;
        document.getElementById('txt-last').innerText = t.last;
        document.getElementById('txt-next').innerText = t.next;
        document.getElementById('txt-w').innerText = t.w;
        document.getElementById('txt-d').innerText = t.d;
        document.getElementById('txt-l').innerText = t.l;
        document.getElementById('txt-gf').innerText = t.gf;
        document.getElementById('txt-ga').innerText = t.ga;
        document.getElementById('txt-av').innerText = t.av;
        document.getElementById('txt-country-label').innerText = t.country;
        document.getElementById('txt-animal-label').innerText = t.animal;
        
        loadTeamData();
    }

    db.collection("teams").get().then(snap => {
        snap.forEach(doc => allTeamLogos[doc.data().name] = doc.data().logo);
        if (teamName) loadTeamData();
    });

    function loadTeamData() {
        const t = translations[currentLang];
        document.getElementById('team-name').innerText = teamName.toUpperCase();
        document.getElementById('team-logo').src = allTeamLogos[teamName] || '';
        
        db.collection("teams").where("name", "==", teamName).onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                document.getElementById('p-wins').innerText = d.wins || 0;
                document.getElementById('p-draws').innerText = d.draws || 0;
                document.getElementById('p-losses').innerText = d.losses || 0;
                const gf = Number(d["atilan gol"]) || 0;
                const ga = Number(d["yenilen gol"]) || 0;
                document.getElementById('p-goals-for').innerText = gf;
                document.getElementById('p-goals-against').innerText = ga;
                document.getElementById('p-av').innerText = gf - ga;

                document.getElementById('country-name').innerText = d.ülke || '-';
                if (d.ülke) {
                    db.collection("ülkeler").where("ülkead", "==", d.ülke).get().then(uSnap => {
                        if(!uSnap.empty) document.getElementById('flag-large').src = uSnap.docs[0].data().ülkefoto;
                    });
                }

                document.getElementById('animal-name').innerText = d.hayvan || '-';
                if (d.hayvan) {
                    db.collection("hayvanlar").where("hayvanad", "==", d.hayvan).get().then(hSnap => {
                        if(!hSnap.empty) document.getElementById('animal-large').src = hSnap.docs[0].data().hayvanfoto;
                    });
                }
                
                if(d.insta) { 
                    document.getElementById('insta-area').style.display='block'; 
                    document.getElementById('insta-url').href=d.insta; 
                    document.getElementById('insta-team-name').innerText = d.name.toUpperCase(); 
                }
            });
        });

        db.collection("players").where("pteam", "==", teamName).onSnapshot(snap => {
            const list = document.getElementById('player-list'); list.innerHTML = '';
            let players = []; snap.forEach(doc => players.push(doc.data()));
            players.sort((a,b) => (Number(b.goals)||0) - (Number(a.goals)||0)).forEach(p => {
                const isCaptain = p.baskan === true;
                list.innerHTML += `
                <div class="player-card" onclick="window.location.href='oyuncu-detay.html?name=${encodeURIComponent(p.pname)}'">
                    <img src="${p.foto}" class="player-img">
                    <div class="player-info">
                        <b>${p.pname}</b>
                        <div style="color:var(--primary); font-weight:800; font-size:12px; margin-top:2px;">⚽ ${p.goals||0} ${t.goal}</div>
                    </div>
                    <div class="role-badge ${isCaptain ? 'role-captain' : 'role-player'}">
                        ${isCaptain ? t.captain : t.player}
                    </div>
                </div>`;
            });
        });

        db.collection("matches").onSnapshot(snap => {
            const playedDiv = document.getElementById('played-matches'); playedDiv.innerHTML = '';
            const upcomingDiv = document.getElementById('upcoming-matches'); upcomingDiv.innerHTML = '';
            let matches = []; snap.forEach(doc => matches.push(doc.data()));
            matches.filter(m => (m.team1 === teamName || m.team2 === teamName))
                   .forEach(m => {
                        const isT1 = m.team1 === teamName;
                        const opponent = isT1 ? m.team2 : m.team1;
                        const cardHtml = `
                            <div class="match-card" onclick="window.location.href='mac-detay.html?id=${encodeURIComponent(m.team1 + "-vs-" + m.team2 + "-" + m.datejav)}'">
                                <span class="match-date-tag">📅 ${m.date || t.wait}</span>
                                <div class="match-content">
                                    <div class="match-team">
                                        <img src="${allTeamLogos[teamName]}" class="match-logo-small">
                                        <span>${teamName}</span>
                                    </div>
                                    <div class="match-score">${m.played ? (isT1 ? m.score1 : m.score2) + " - " + (isT1 ? m.score2 : m.score1) : "VS"}</div>
                                    <div class="match-team">
                                        <img src="${allTeamLogos[opponent]}" class="match-logo-small">
                                        <span>${opponent}</span>
                                    </div>
                                </div>
                            </div>`;
                        if(m.played) playedDiv.innerHTML += cardHtml;
                        else upcomingDiv.innerHTML += cardHtml;
                   });
        });
    }

    setLang('tr');
</script>
</body>
</html>
