<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takım Detayı | Bobblekolik</title>
    <style>
        :root { 
            --bg-color: #e8e1d1; 
            --text-color: #3d3d3d; 
            --card-bg: #f2ede1; 
            --header-bg: #800000; 
            --header-text: #e8e1d1;
            --accent: #ffd700;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding-bottom: 120px; color: var(--text-color); }
        
        /* NAV */
        .back-nav { background: #1a1a1a; padding: 15px 25px; border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .lang-picker { display: flex; gap: 10px; }
        .lang-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer; overflow: hidden; opacity: 0.6; padding: 0; background: white; transition: 0.3s; }
        .lang-btn.active { opacity: 1; transform: scale(1.1); border-color: white; }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* HEADER & META CARDS */
        .header { background: var(--header-bg); color: var(--header-text); padding: 40px 20px; text-align: center; border-bottom: 8px solid #1a1a1a; }
        .main-info { margin-bottom: 35px; }
        .team-logo-large { width: 140px; height: 140px; border-radius: 50%; background: white; border: 5px solid #1a1a1a; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .team-title { font-size: 38px; font-weight: 900; letter-spacing: 3px; margin: 15px 0 0 0; text-transform: uppercase; }

        .meta-container { display: flex; justify-content: center; gap: 20px; max-width: 950px; margin: 0 auto; flex-wrap: wrap; }
        .meta-box { background: rgba(255,255,255,0.1); border: 2px solid var(--accent); border-radius: 20px; padding: 15px; width: 260px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .meta-label { display: block; font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1.5px; }
        .meta-img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; background: white; border: 2px solid #1a1a1a; }
        .meta-name { display: block; font-size: 18px; font-weight: 800; color: white; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 30px; max-width: 1100px; margin: auto; }
        .section-title { font-size: 22px; font-weight: 900; color: #1a1a1a; margin: 50px 0 25px 0; display: flex; align-items: center; gap: 15px; text-transform: uppercase; }
        .section-title::after { content: ""; height: 4px; background: var(--header-bg); flex: 1; border-radius: 2px; }
        
        /* OYUNCU KARTI */
        .player-card { background: var(--card-bg); padding: 15px 25px; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 6px 12px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .player-card:hover { transform: translateY(-5px); border-color: var(--header-bg); }
        .player-img { width: 70px; height: 70px; border-radius: 15px; margin-right: 20px; object-fit: cover; border: 3px solid var(--header-bg); }
        .player-info b { font-size: 20px; color: #1a1a1a; text-transform: uppercase; }
        .role-badge { margin-left: auto; padding: 8px 18px; border-radius: 12px; font-size: 12px; font-weight: 900; text-transform: uppercase; }
        .role-captain { background: var(--accent); color: #1a1a1a; border: 2px solid #1a1a1a; }
        .role-player { background: #e0dace; color: #777; }

        /* MAÇ KARTLARI */
        .match-card { background: var(--card-bg); padding: 25px; border-radius: 24px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-left: 8px solid var(--header-bg); }
        .match-date-tag { display: block; text-align: center; color: var(--header-bg); font-weight: 800; font-size: 13px; margin-bottom: 15px; }
        .match-content { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px; }
        .match-team { display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: 900; text-align: center; }
        .match-score { background: #1a1a1a; color: var(--accent); padding: 10px 20px; border-radius: 12px; font-size: 24px; font-weight: 900; min-width: 70px; text-align: center; }
        .match-logo-small { width: 60px; height: 60px; border-radius: 50%; background: white; object-fit: cover; border: 2px solid #ddd; }

        /* PERFORMANS */
        .performance-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .perf-card { background: var(--card-bg); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .perf-value { font-size: 36px; font-weight: 900; color: var(--header-bg); display: block; }
        .perf-goals-for { border-bottom: 6px solid #2ecc71; }
        .perf-goals-against { border-bottom: 6px solid #e74c3c; }

        .insta-footer { text-align: center; margin-top: 60px; }
        .insta-link { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; color: white; background: linear-gradient(45deg, #f09433, #e74371, #962fbf); padding: 15px 40px; border-radius: 50px; font-weight: 900; }
    </style>
</head>
<body>

<nav class="back-nav">
    <a href="index.html" class="back-btn" id="txt-home">⬅ ANA SAYFAYA DÖN</a>
    <div class="lang-picker">
        <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr"><img src="https://flagcdn.com/w40/tr.png"></button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w40/gb.png"></button>
        <button class="lang-btn" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w40/pt.png"></button>
    </div>
</nav>

<div class="header">
    <div class="main-info">
        <img id="team-logo" class="team-logo-large" src="">
        <h1 id="team-name" class="team-title">...</h1>
    </div>

    <div class="meta-container">
        <div class="meta-box">
            <span class="meta-label" id="txt-country-label">ÜLKE</span>
            <img id="flag-large" class="meta-img" src="placeholder.jpg">
            <span id="country-name" class="meta-name">-</span>
        </div>
        <div class="meta-box">
            <span class="meta-label" id="txt-animal-label">MASKOT</span>
            <img id="animal-large" class="meta-img" src="placeholder.jpg">
            <span id="animal-name" class="meta-name">-</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="section-title" id="txt-squad">TAKIM KADROSU</div>
    <div id="player-list"></div>

    <div class="section-title" id="txt-stats">PERFORMANS VERİLERİ</div>
    <div class="performance-grid">
        <div class="perf-card"><span class="perf-value" id="p-wins">0</span><span class="perf-label" id="txt-w">Galibiyet</span></div>
        <div class="perf-card"><span class="perf-value" id="p-draws">0</span><span class="perf-label" id="txt-d">Berabere</span></div>
        <div class="perf-card"><span class="perf-value" id="p-losses">0</span><span class="perf-label" id="txt-l">Mağlubiyet</span></div>
        <div class="perf-card perf-goals-for"><span class="perf-value" id="p-goals-for">0</span><span class="perf-label" id="txt-gf">Atılan</span></div>
        <div class="perf-card perf-goals-against"><span class="perf-value" id="p-goals-against">0</span><span class="perf-label" id="txt-ga">Yenilen</span></div>
    </div>

    <div class="section-title" id="txt-last">SON MAÇLAR</div>
    <div id="played-matches"></div>

    <div class="section-title" id="txt-next">GELECEK MAÇLAR</div>
    <div id="upcoming-matches"></div>

    <div id="insta-area" class="insta-footer" style="display:none;">
        <a id="insta-url" href="#" target="_blank" class="insta-link">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="25">
            <span id="insta-team-name">INSTAGRAM</span>
        </a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBEi_PQ2oYKW23Fu65M7MKPFKELRbqY6XQ", authDomain: "bobblekolik.firebaseapp.com", projectId: "bobblekolik", storageBucket: "bobblekolik.firebasestorage.app", messagingSenderId: "566665011913", appId: "1:566665011913:web:4e2570f7291f82fdb76318" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const translations = {
        tr: { home: "⬅ ANA SAYFAYA DÖN", squad: "TAKIM KADROSU", stats: "PERFORMANS VERİLERİ", last: "SON MAÇLAR", next: "GELECEK MAÇLAR", w: "Galibiyet", d: "Berabere", l: "Mağlubiyet", gf: "Atılan", ga: "Yenilen", goal: "GOL", wait: "TARİH BEKLENİYOR", captain: "KAPTAN", player: "OYUNCU", country: "ÜLKE", animal: "MASKOT" },
        en: { home: "⬅ BACK TO HOME", squad: "TEAM SQUAD", stats: "STATS", last: "RECENT", next: "UPCOMING", w: "Wins", d: "Draws", l: "Losses", gf: "Scored", ga: "Conceded", goal: "GOALS", wait: "PENDING", captain: "CAPTAIN", player: "PLAYER", country: "COUNTRY", animal: "MASCOT" },
        pt: { home: "⬅ VOLTAR", squad: "ELENCO", stats: "ESTATÍSTICAS", last: "ÚLTIMOS", next: "PRÓXIMOS", w: "Vitórias", d: "Empates", l: "Derrotas", gf: "Gols Pró", ga: "Gols Contra", goal: "GOLS", wait: "PENDENTE", captain: "CAPITÃO", player: "JOGADOR", country: "PAÍS", animal: "MASCOTE" }
    };

    let currentLang = 'tr';
    const urlParams = new URLSearchParams(window.location.search);
    const teamName = urlParams.get('name');
    let allTeamLogos = {};

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const t = translations[lang];
        document.getElementById('txt-home').innerText = t.home;
        document.getElementById('txt-squad').innerText = t.squad;
        document.getElementById('txt-stats').innerText = t.stats;
        document.getElementById('txt-last').innerText = t.last;
        document.getElementById('txt-next').innerText = t.next;
        document.getElementById('txt-w').innerText = t.w;
        document.getElementById('txt-d').innerText = t.d;
        document.getElementById('txt-l').innerText = t.l;
        document.getElementById('txt-gf').innerText = t.gf;
        document.getElementById('txt-ga').innerText = t.ga;
        document.getElementById('txt-country-label').innerText = t.country;
        document.getElementById('txt-animal-label').innerText = t.animal;
        loadTeamData();
    }

    db.collection("teams").get().then(snap => {
        snap.forEach(doc => allTeamLogos[doc.data().name] = doc.data().logo);
        if (teamName) loadTeamData();
    });

    function loadTeamData() {
        const t = translations[currentLang];
        document.getElementById('team-name').innerText = teamName.toUpperCase();
        document.getElementById('team-logo').src = allTeamLogos[teamName] || '';
        
        db.collection("teams").where("name", "==", teamName).onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                document.getElementById('p-wins').innerText = d.wins || 0;
                document.getElementById('p-draws').innerText = d.draws || 0;
                document.getElementById('p-losses').innerText = d.losses || 0;
                document.getElementById('p-goals-for').innerText = d["atilan gol"] || 0;
                document.getElementById('p-goals-against').innerText = d["yenilen gol"] || 0;

                // 1. Ülke Bilgisini Başka Tablodan Çekme
                const ulkeAdi = d.ülke;
                document.getElementById('country-name').innerText = ulkeAdi || '-';
                if (ulkeAdi) {
                    db.collection("ülkeler").where("ülkead", "==", ulkeAdi).get().then(uSnap => {
                        if(!uSnap.empty) document.getElementById('flag-large').src = uSnap.docs[0].data().ülkefoto;
                    });
                }

                // 2. Maskot Bilgisini Başka Tablodan Çekme (koleksiyon adın "hayvanlar" ise)
                const hayvanAdi = d.hayvan;
                document.getElementById('animal-name').innerText = hayvanAdi || '-';
                if (hayvanAdi) {
                    db.collection("hayvanlar").where("hayvanad", "==", hayvanAdi).get().then(hSnap => {
                        if(!hSnap.empty) document.getElementById('animal-large').src = hSnap.docs[0].data().hayvanfoto;
                    });
                }
                
                if(d.insta) { 
                    document.getElementById('insta-area').style.display='block'; 
                    document.getElementById('insta-url').href=d.insta; 
                    document.getElementById('insta-team-name').innerText = d.name.toUpperCase(); 
                }
            });
        });

        // Oyuncular
        db.collection("players").where("pteam", "==", teamName).onSnapshot(snap => {
            const list = document.getElementById('player-list'); list.innerHTML = '';
            let players = []; snap.forEach(doc => players.push(doc.data()));
            players.sort((a,b) => b.goals - a.goals).forEach(p => {
                const isCaptain = p.baskan === true;
                list.innerHTML += `
                <div class="player-card" onclick="window.location.href='oyuncu-detay.html?name=${encodeURIComponent(p.pname)}'">
                    <img src="${p.foto}" class="player-img">
                    <div class="player-info">
                        <b>${p.pname}</b>
                        <div style="color:#800000; font-weight:800; font-size:14px; margin-top:4px;">⚽ ${p.goals||0} ${t.goal}</div>
                    </div>
                    <div class="role-badge ${isCaptain ? 'role-captain' : 'role-player'}">
                        ${isCaptain ? t.captain : t.player}
                    </div>
                </div>`;
            });
        });

        // Maçlar
        db.collection("matches").onSnapshot(snap => {
            const playedDiv = document.getElementById('played-matches'); playedDiv.innerHTML = '';
            const upcomingDiv = document.getElementById('upcoming-matches'); upcomingDiv.innerHTML = '';
            let matches = []; snap.forEach(doc => matches.push(doc.data()));

            matches.filter(m => (m.team1 === teamName || m.team2 === teamName))
                   .forEach(m => {
                        const isT1 = m.team1 === teamName;
                        const opponent = isT1 ? m.team2 : m.team1;
                        const cardHtml = `
                            <div class="match-card" onclick="window.location.href='mac-detay.html?id=${encodeURIComponent(m.team1 + "-vs-" + m.team2 + "-" + m.datejav)}'">
                                <span class="match-date-tag">📅 ${m.date || t.wait}</span>
                                <div class="match-content">
                                    <div class="match-team">
                                        <img src="${allTeamLogos[teamName]}" class="match-logo-small">
                                        <span>${teamName}</span>
                                    </div>
                                    <div class="match-score">${m.played ? (isT1 ? m.score1 : m.score2) + " - " + (isT1 ? m.score2 : m.score1) : "VS"}</div>
                                    <div class="match-team">
                                        <img src="${allTeamLogos[opponent]}" class="match-logo-small">
                                        <span>${opponent}</span>
                                    </div>
                                </div>
                            </div>`;
                        if(m.played) playedDiv.innerHTML += cardHtml;
                        else upcomingDiv.innerHTML += cardHtml;
                   });
        });
    }

    setLang('tr');
</script>
</body>
</html>
