<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Takım Detayı | Bobblekolik</title>
    <style>
        :root {
            /* Ana uygulama temasıyla uyumlu */
            --bg: #121212; --card: #1e1e1e; --text: #e8e1d1; --primary: #800000; --accent: #ffd700; --border: #333;
            --plus: #2ecc71; --minus: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; line-height: 1.4; }

        /* Üst Navigasyon */
        .back-nav { 
            position: sticky; top: 0; z-index: 1000; height: 60px;
            background: var(--primary); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 2px solid var(--accent);
        }
        .back-btn { color: white; text-decoration: none; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .lang-picker { display: flex; gap: 8px; }
        .lang-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; background: #fff; cursor: pointer; padding: 0; opacity: 0.6; }
        .lang-btn.active { opacity: 1; border-width: 2px; transform: scale(1.1); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Header Area */
        .team-header { 
            background: linear-gradient(to bottom, var(--primary), #121212); 
            padding: 30px 20px; text-align: center; 
        }
        .team-logo-large { 
            width: 110px; height: 110px; border-radius: 50%; background: white; 
            border: 4px solid var(--accent); object-fit: cover; box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }
        .team-title { font-size: 24px; font-weight: 900; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }

        /* Meta Info (Ülke & Maskot) - Yan Yana Mobil Düzen */
        .meta-container { display: flex; gap: 10px; padding: 0 15px; margin-top: -20px; margin-bottom: 25px; }
        .meta-box { 
            flex: 1; background: var(--card); border-radius: 15px; padding: 12px; 
            text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .meta-label { font-size: 9px; font-weight: 900; color: var(--accent); opacity: 0.8; display: block; margin-bottom: 8px; }
        .meta-img { width: 100%; height: 70px; object-fit: cover; border-radius: 8px; background: #000; margin-bottom: 8px; }
        .meta-name { font-size: 12px; font-weight: 800; color: #fff; text-transform: uppercase; }

        .container { padding: 0 15px; }
        .section-title { 
            font-size: 16px; font-weight: 900; color: var(--accent); 
            margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; 
        }
        .section-title::after { content: ""; height: 2px; background: var(--border); flex: 1; }

        /* Performans Grid */
        .performance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .perf-card { 
            background: var(--card); padding: 12px 5px; border-radius: 12px; 
            text-align: center; border: 1px solid var(--border); 
        }
        .perf-value { font-size: 20px; font-weight: 900; color: white; display: block; }
        .perf-label { font-size: 9px; font-weight: 700; opacity: 0.6; text-transform: uppercase; }
        .perf-goals-for { border-bottom: 3px solid var(--plus); }
        .perf-goals-against { border-bottom: 3px solid var(--minus); }

        /* Oyuncu Listesi */
        .player-card { 
            background: var(--card); padding: 10px 15px; border-radius: 15px; 
            margin-bottom: 10px; display: flex; align-items: center; 
            border: 1px solid var(--border);
        }
        .player-img { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; object-fit: cover; border: 2px solid var(--primary); }
        .player-info b { font-size: 15px; color: white; text-transform: uppercase; display: block; }
        .role-badge { 
            margin-left: auto; padding: 5px 10px; border-radius: 8px; 
            font-size: 10px; font-weight: 900; text-transform: uppercase;
        }
        .role-captain { background: var(--accent); color: #000; }
        .role-player { background: #333; color: #aaa; }

        /* Maç Kartları */
        .match-card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            border-left: 5px solid var(--primary);
        }
        .match-date-tag { font-size: 10px; font-weight: 700; opacity: 0.5; display: block; text-align: center; margin-bottom: 10px; }
        .match-content { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .match-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; text-align: center; }
        .match-logo-small { width: 35px; height: 35px; border-radius: 50%; background: white; object-fit: cover; }
        .match-score { background: #000; color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 18px; font-weight: 900; min-width: 55px; text-align: center; }

        .insta-footer { text-align: center; margin: 30px 0; }
        .insta-link { 
            display: inline-flex; align-items: center; gap: 8px; 
            text-decoration: none; color: white; background: linear-gradient(45deg, #f09433, #e74371, #962fbf); 
            padding: 12px 25px; border-radius: 30px; font-weight: 800; font-size: 14px;
        }
    </style>
</head>
<body>

<nav class="back-nav">
    <a href="index.html" class="back-btn" id="txt-home">⬅ GERİ</a>
    <div class="lang-picker">
        <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr"><img src="https://flagcdn.com/w40/tr.png"></button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w40/gb.png"></button>
        <button class="lang-btn" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w40/pt.png"></button>
    </div>
</nav>

<div class="team-header">
    <img id="team-logo" class="team-logo-large" src="">
    <h1 id="team-name" class="team-title">...</h1>
</div>

<div class="meta-container">
    <div class="meta-box">
        <span class="meta-label" id="txt-country-label">ÜLKE</span>
        <img id="flag-large" class="meta-img" src="">
        <span id="country-name" class="meta-name">-</span>
    </div>
    <div class="meta-box">
        <span class="meta-label" id="txt-animal-label">MASKOT</span>
        <img id="animal-large" class="meta-img" src="">
        <span id="animal-name" class="meta-name">-</span>
    </div>
</div>

<div class="container">
    <div class="section-title" id="txt-stats">İSTATİSTİKLER</div>
    <div class="performance-grid">
        <div class="perf-card"><span class="perf-value" id="p-wins">0</span><span class="perf-label" id="txt-w">G</span></div>
        <div class="perf-card"><span class="perf-value" id="p-draws">0</span><span class="perf-label" id="txt-d">B</span></div>
        <div class="perf-card"><span class="perf-value" id="p-losses">0</span><span class="perf-label" id="txt-l">M</span></div>
        <div class="perf-card perf-goals-for"><span class="perf-value" id="p-goals-for">0</span><span class="perf-label" id="txt-gf">GOL+</span></div>
        <div class="perf-card perf-goals-against"><span class="perf-value" id="p-goals-against">0</span><span class="perf-label" id="txt-ga">GOL-</span></div>
        <div class="perf-card"><span class="perf-value" id="p-av">0</span><span class="perf-label">AV</span></div>
    </div>

    <div class="section-title" id="txt-squad">KADRO</div>
    <div id="player-list"></div>

    <div class="section-title" id="txt-last">SON MAÇLAR</div>
    <div id="played-matches"></div>

    <div class="section-title" id="txt-next">GELECEK</div>
    <div id="upcoming-matches"></div>

    <div id="insta-area" class="insta-footer" style="display:none;">
        <a id="insta-url" href="#" target="_blank" class="insta-link">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="20">
            <span id="insta-team-name">INSTAGRAM</span>
        </a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBEi_PQ2oYKW23Fu65M7MKPFKELRbqY6XQ", authDomain: "bobblekolik.firebaseapp.com", projectId: "bobblekolik", storageBucket: "bobblekolik.firebasestorage.app", messagingSenderId: "566665011913", appId: "1:566665011913:web:4e2570f7291f82fdb76318" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const translations = {
        tr: { home: "⬅ GERİ", squad: "KADRO", stats: "İSTATİSTİKLER", last: "SON MAÇLAR", next: "GELECEK MAÇLAR", w: "G", d: "B", l: "M", gf: "GOL+", ga: "GOL-", goal: "GOL", wait: "BEKLENİYOR", captain: "KAPTAN", player: "OYUNCU", country: "ÜLKE", animal: "MASKOT" },
        en: { home: "⬅ BACK", squad: "SQUAD", stats: "STATS", last: "RECENT", next: "UPCOMING", w: "W", d: "D", l: "L", gf: "GF", ga: "GA", goal: "GOALS", wait: "PENDING", captain: "CAPTAIN", player: "PLAYER", country: "COUNTRY", animal: "MASCOT" },
        pt: { home: "⬅ VOLTAR", squad: "ELENCO", stats: "ESTATÍSTICAS", last: "ÚLTIMOS", next: "PRÓXIMOS", w: "V", d: "E", l: "D", gf: "GP", ga: "GC", goal: "GOLS", wait: "PENDENTE", captain: "CAPITÃO", player: "JOGADOR", country: "PAÍS", animal: "MASCOTE" }
    };

    let currentLang = 'tr';
    const urlParams = new URLSearchParams(window.location.search);
    const teamName = urlParams.get('name');
    let allTeamLogos = {};

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const t = translations[lang];
        document.getElementById('txt-home').innerText = t.home;
        document.getElementById('txt-squad').innerText = t.squad;
        document.getElementById('txt-stats').innerText = t.stats;
        document.getElementById('txt-last').innerText = t.last;
        document.getElementById('txt-next').innerText = t.next;
        document.getElementById('txt-country-label').innerText = t.country;
        document.getElementById('txt-animal-label').innerText = t.animal;
        loadTeamData();
    }

    db.collection("teams").get().then(snap => {
        snap.forEach(doc => allTeamLogos[doc.data().name] = doc.data().logo);
        if (teamName) loadTeamData();
    });

    function loadTeamData() {
        const t = translations[currentLang];
        document.getElementById('team-name').innerText = teamName.toUpperCase();
        document.getElementById('team-logo').src = allTeamLogos[teamName] || '';
        
        db.collection("teams").where("name", "==", teamName).onSnapshot(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                document.getElementById('p-wins').innerText = d.wins || 0;
                document.getElementById('p-draws').innerText = d.draws || 0;
                document.getElementById('p-losses').innerText = d.losses || 0;
                const gf = Number(d["atilan gol"]) || 0;
                const ga = Number(d["yenilen gol"]) || 0;
                document.getElementById('p-goals-for').innerText = gf;
                document.getElementById('p-goals-against').innerText = ga;
                document.getElementById('p-av').innerText = gf - ga;

                const ulkeAdi = d.ülke;
                document.getElementById('country-name').innerText = ulkeAdi || '-';
                if (ulkeAdi) {
                    db.collection("ülkeler").where("ülkead", "==", ulkeAdi).get().then(uSnap => {
                        if(!uSnap.empty) document.getElementById('flag-large').src = uSnap.docs[0].data().ülkefoto;
                    });
                }

                const hayvanAdi = d.hayvan;
                document.getElementById('animal-name').innerText = hayvanAdi || '-';
                if (hayvanAdi) {
                    db.collection("hayvanlar").where("hayvanad", "==", hayvanAdi).get().then(hSnap => {
                        if(!hSnap.empty) document.getElementById('animal-large').src = hSnap.docs[0].data().hayvanfoto;
                    });
                }
                
                if(d.insta) { 
                    document.getElementById('insta-area').style.display='block'; 
                    document.getElementById('insta-url').href=d.insta; 
                    document.getElementById('insta-team-name').innerText = d.name.toUpperCase(); 
                }
            });
        });

        // Oyuncular
        db.collection("players").where("pteam", "==", teamName).onSnapshot(snap => {
            const list = document.getElementById('player-list'); list.innerHTML = '';
            let players = []; snap.forEach(doc => players.push(doc.data()));
            players.sort((a,b) => (Number(b.goals)||0) - (Number(a.goals)||0)).forEach(p => {
                const isCaptain = p.baskan === true;
                list.innerHTML += `
                <div class="player-card" onclick="window.location.href='oyuncu-detay.html?name=${encodeURIComponent(p.pname)}'">
                    <img src="${p.foto}" class="player-img">
                    <div class="player-info">
                        <b>${p.pname}</b>
                        <div style="color:var(--accent); font-weight:800; font-size:12px; margin-top:2px;">⚽ ${p.goals||0} ${t.goal}</div>
                    </div>
                    <div class="role-badge ${isCaptain ? 'role-captain' : 'role-player'}">
                        ${isCaptain ? t.captain : t.player}
                    </div>
                </div>`;
            });
        });

        // Maçlar
        db.collection("matches").onSnapshot(snap => {
            const playedDiv = document.getElementById('played-matches'); playedDiv.innerHTML = '';
            const upcomingDiv = document.getElementById('upcoming-matches'); upcomingDiv.innerHTML = '';
            let matches = []; snap.forEach(doc => matches.push(doc.data()));

            matches.filter(m => (m.team1 === teamName || m.team2 === teamName))
                   .forEach(m => {
                        const isT1 = m.team1 === teamName;
                        const opponent = isT1 ? m.team2 : m.team1;
                        const cardHtml = `
                            <div class="match-card" onclick="window.location.href='mac-detay.html?id=${encodeURIComponent(m.team1 + "-vs-" + m.team2 + "-" + m.datejav)}'">
                                <span class="match-date-tag">📅 ${m.date || t.wait}</span>
                                <div class="match-content">
                                    <div class="match-team">
                                        <img src="${allTeamLogos[teamName]}" class="match-logo-small">
                                        <span>${teamName}</span>
                                    </div>
                                    <div class="match-score">${m.played ? (isT1 ? m.score1 : m.score2) + " - " + (isT1 ? m.score2 : m.score1) : "VS"}</div>
                                    <div class="match-team">
                                        <img src="${allTeamLogos[opponent]}" class="match-logo-small">
                                        <span>${opponent}</span>
                                    </div>
                                </div>
                            </div>`;
                        if(m.played) playedDiv.innerHTML += cardHtml;
                        else upcomingDiv.innerHTML += cardHtml;
                   });
        });
    }

    setLang('tr');
</script>
</body>
</html>
