<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oyuncu Profili | Bobblekolik</title>
    <style>
        :root {
            /* AYDINLIK TEMA */
            --bg: #f8f9fa; --card: #ffffff; --text: #2d3436; 
            --primary: #800000; --accent: #ffd700; --border: #e0e0e0;
            --sub-text: #636e72; --stat-card: #ffffff;
        }

        [data-theme="dark"] {
            /* KARANLIK TEMA */
            --bg: #0f0f0f; --card: #1a1a1a; --text: #e8e1d1;
            --border: #2a2a2a; --sub-text: #a0a0a0;
            --stat-card: #252525;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

        /* Üst Navigasyon */
        .back-nav { 
            position: sticky; top: 0; z-index: 1000; height: 60px;
            background: var(--primary); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 3px solid var(--accent);
        }
        .back-btn { color: white; text-decoration: none; font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .theme-toggle { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 10px; border-radius: 8px; cursor: pointer; }
        .lang-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; cursor: pointer; opacity: 0.6; }
        .lang-btn.active { opacity: 1; border-width: 2px; transform: scale(1.1); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Profil Kartı Üst Kısım */
        .profile-header {
            background: linear-gradient(180deg, var(--primary) 0%, var(--bg) 100%);
            padding: 40px 15px 60px;
            text-align: center;
        }
        .player-img-wrapper { position: relative; display: inline-block; margin-bottom: 20px; }
        .player-photo {
            width: 150px; height: 150px; border-radius: 30px; object-fit: cover;
            border: 4px solid var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .player-name { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-top: 10px; }

        /* Rozetler */
        .badges-row { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .badge-pill {
            background: var(--card); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 50px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
        }
        .badge-pill img { width: 24px; height: 24px; border-radius: 50%; object-fit: contain; }
        .badge-pill span { font-size: 12px; font-weight: 800; color: var(--text); }

        /* İstatistikler (Grid) */
        .main-container { padding: 0 15px; margin-top: -40px; max-width: 600px; margin-left: auto; margin-right: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card {
            background: var(--stat-card); padding: 20px; border-radius: 20px;
            text-align: center; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .stat-val { display: block; font-size: 32px; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 11px; font-weight: 800; color: var(--sub-text); text-transform: uppercase; letter-spacing: 1px; }

        /* Biyografi Bölümü */
        .info-card {
            background: var(--card); border-radius: 24px; padding: 25px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .info-card h2 { 
            font-size: 16px; font-weight: 900; color: var(--primary); 
            margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
            text-transform: uppercase;
        }
        .info-card h2::after { content: ''; height: 2px; flex: 1; background: var(--accent); opacity: 0.3; }
        .bio-text { font-size: 14px; color: var(--text); line-height: 1.7; opacity: 0.9; white-space: pre-line; }

        /* Instagram Butonu */
        .insta-btn {
            display: none; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; text-decoration: none; padding: 16px; border-radius: 18px;
            font-weight: 900; font-size: 14px; margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(220, 39, 67, 0.2);
        }
        .insta-btn img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        .season-badge {
            background: var(--accent); color: #000; font-size: 10px; font-weight: 900;
            padding: 4px 12px; border-radius: 10px; margin-bottom: 10px; display: inline-block;
        }

    </style>
</head>
<body data-theme="dark">

<nav class="back-nav">
    <a href="index.html" class="back-btn" id="txt-back">⬅ GERİ DÖN</a>
    <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️</button>
        <div class="lang-picker">
            <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr"><img src="https://flagcdn.com/w40/tr.png"></button>
            <button class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w40/gb.png"></button>
            <button class="lang-btn" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w40/pt.png"></button>
        </div>
    </div>
</nav>

<header class="profile-header">
    <div class="player-img-wrapper">
        <img id="p-foto" src="" class="player-photo" alt="Player">
    </div>
    <h1 id="p-name" class="player-name">YÜKLENİYOR...</h1>
    
    <div class="badges-row">
        <div class="badge-pill" id="team-click-area">
            <img id="p-team-logo" src="">
            <span id="p-team-name">-</span>
        </div>
        <div class="badge-pill">
            <img id="p-country-logo" src="">
            <span id="p-country-name">-</span>
        </div>
    </div>
</header>

<main class="main-container">
    <div style="text-align: center;">
        <span class="season-badge" id="lbl-season">5. SEZON</span>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val" id="p-goals">0</span>
            <span class="stat-label" id="lbl-gol">GOL</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="p-asist">0</span>
            <span class="stat-label" id="lbl-asist">ASİST</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="p-rating">0.0</span>
            <span class="stat-label" id="lbl-rat">RATING</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="p-mac">0</span>
            <span class="stat-label" id="lbl-mac">MAÇ</span>
        </div>
    </div>

    <div class="info-card">
        <h2 id="lbl-bio">KARİYER & BİLGİ</h2>
        <p id="player-bio-text" class="bio-text"></p>
    </div>

    <a href="#" id="insta-link" target="_blank" class="insta-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
        <span id="lbl-insta">INSTAGRAM PROFILI</span>
    </a>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBEi_PQ2oYKW23Fu65M7MKPFKELRbqY6XQ", authDomain: "bobblekolik.firebaseapp.com", projectId: "bobblekolik", storageBucket: "bobblekolik.firebasestorage.app", messagingSenderId: "566665011913", appId: "1:566665011913:web:4e2570f7291f82fdb76318" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const translations = {
        tr: { back: "⬅ GERİ DÖN", bio: "KARİYER & BİLGİ", gol: "GOL", asist: "ASİST", rat: "RATING", mac: "MAÇ", season: "5. SEZON", insta: "INSTAGRAM PROFİLİ" },
        en: { back: "⬅ GO BACK", bio: "CAREER & INFO", gol: "GOALS", asist: "ASSISTS", rat: "RATING", mac: "MATCH", season: "SEASON 5", insta: "INSTAGRAM PROFILE" },
        pt: { back: "⬅ VOLTAR", bio: "INFO E CARREIRA", gol: "GOLOS", asist: "ASSISTÊNCIAS", rat: "AVALIAÇÃO", mac: "JOGO", season: "5ª TEMPORADA", insta: "PERFIL DO INSTAGRAM" }
    };

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.innerText = isDark ? '🌙' : '☀️';
        localStorage.setItem('profile-theme', isDark ? 'light' : 'dark');
    }

    const savedTheme = localStorage.getItem('profile-theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const t = translations[lang];
        document.getElementById('txt-back').innerText = t.back;
        document.getElementById('lbl-bio').innerText = t.bio;
        document.getElementById('lbl-gol').innerText = t.gol;
        document.getElementById('lbl-asist').innerText = t.asist;
        document.getElementById('lbl-rat').innerText = t.rat;
        document.getElementById('lbl-mac').innerText = t.mac;
        document.getElementById('lbl-season').innerText = t.season;
        document.getElementById('lbl-insta').innerText = t.insta;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const playerName = urlParams.get('name');

    if(playerName) {
        db.collection("players").where("pname", "==", playerName).onSnapshot(snap => {
            if(!snap.empty) {
                const data = snap.docs[0].data();
                document.getElementById('p-name').innerText = data.pname.toUpperCase();
                document.getElementById('p-foto').src = data.foto;
                document.getElementById('p-team-name').innerText = data.pteam || "-";
                document.getElementById('p-country-name').innerText = data.pülke || "-";
                document.getElementById('p-goals').innerText = data.goals || 0;
                document.getElementById('p-asist').innerText = data.asistsay || 0;
                document.getElementById('p-rating').innerText = data.ratingoy || "0.0";
                document.getElementById('p-mac').innerText = data.poyn || 0;
                document.getElementById('player-bio-text').innerText = data.bilgi || "---";

                if(data.instaoy) {
                    const iLink = document.getElementById('insta-link');
                    iLink.href = data.instaoy;
                    iLink.style.display = 'flex';
                }

                db.collection("teams").where("name", "==", data.pteam).get().then(tSnap => {
                    if(!tSnap.empty) {
                        document.getElementById('p-team-logo').src = tSnap.docs[0].data().logo;
                        document.getElementById('team-click-area').onclick = () => window.location.href = `takim.html?name=${encodeURIComponent(data.pteam)}`;
                    }
                });

                if(data.pülke) {
                    db.collection("ülkeler").where("ülkead", "==", data.pülke).get().then(uSnap => {
                        if(!uSnap.empty) document.getElementById('p-country-logo').src = uSnap.docs[0].data().ülkefoto;
                    });
                }
            }
        });
    }
    setLang('tr');
</script>
</body>
</html>
